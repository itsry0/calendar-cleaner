name: Update Calendar

on:
  schedule:
    - cron: "0 * * * *"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.x'

      - name: Install requests
        run: pip install requests

      - name: Run script
        run: python clean_calendar.py

      - name: Commit & push (safe)
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: "update calendar"
          file_pattern: cleaned.ics
